name: Deploy Testing
description: Verify that the deployment is correct

vars:
  github_token: "{{ GITHUB_TOKEN ?? '' }}"
  aws_access_key_id: "{{ AWS_ACCESS_KEY_ID ?? '' }}"
  aws_secret_access_key: "{{ AWS_SECRET_ACCESS_KEY ?? '' }}"
  google_application_credentials: "{{ GOOGLE_APPLICATION_CREDENTIALS ?? '' }}"
  slack_token: "{{ SLACK_TOKEN ?? '' }}"
  dockerhub_username: "{{ DOCKERHUB_USERNAME ?? '' }}"
  dockerhub_token: "{{ DOCKERHUB_TOKEN ?? '' }}"

jobs:
- name: Check credentials
  id: check
  steps:
  - name: GITHUB_TOKEN is not empty
    uses: hello
    test: vars.github_token != ''
  - name: AWS_ACCESS_KEY_ID is not empty
    uses: hello
    test: vars.aws_access_key_id != ''
  - name: AWS_SECRET_ACCESS_KEY is not empty
    uses: hello
    test: vars.aws_secret_access_key != ''
  - name: GOOGLE_APPLICATION_CREDENTIALS is not empty
    uses: hello
    test: vars.google_application_credentials != ''
  - name: SLACK_TOKEN is not empty
    uses: hello
    test: vars.slack_token != ''

- name: Generate version
  id: generate_version
  needs: [check]
  steps:
  - name: Generate version string
    id: genver
    uses: hello
    vars:
      version: v3.0.0-{{ unixtime() }}
    outputs:
      version: vars.version
    echo: "Generated version: {{ vars.version }}"

- name: Build dewy
  id: build
  needs: [generate_version]
  steps:
  - name: Go build for {{ vars.command }}-{{ vars.variant }}
    uses: shell
    with:
      cmd: go build -o ./e2e/{{ vars.command }}/{{ vars.variant }}/dewy ./cmd/dewy
    test: status == 0
    iteration:
    - { command: 'server', variant: 'ghr' }
    - { command: 'server', variant: 's3' }
    - { command: 'server', variant: 'gs' }
    - { command: 'server', variant: 'ghr-s3cache-a' }
    - { command: 'server', variant: 'ghr-s3cache-b' }
    - { command: 'server', variant: 'ghr-gscache-a' }
    - { command: 'server', variant: 'ghr-gscache-b' }
    - { command: 'assets', variant: 'ghr' }
    - { command: 'assets', variant: 's3' }
    - { command: 'assets', variant: 'gs' }
    - { command: 'container', variant: 'img' }
    - { command: 'container', variant: 'dockerhub' }
    - { command: 'container', variant: 'multiport' }
    - { command: 'container', variant: 'podman' }

# Phase 1: Start all dewy instances and wait for initial deployment (parallel)

- name: Start server by Github-Releases registry with Slack notification
  id: start_srv_ghr
  needs: [build]
  steps:
  - name: Start dewy
    id: srv_ghr
    uses: shell
    with:
      workdir: ./e2e/server/ghr
      background: true
      env:
        GITHUB_TOKEN: "{{ vars.github_token }}"
        AWS_ACCESS_KEY_ID: "{{ vars.aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY: "{{ vars.aws_secret_access_key }}"
        GOOGLE_APPLICATION_CREDENTIALS: "{{ vars.google_application_credentials }}"
        SLACK_TOKEN: "{{ vars.slack_token }}"
      cmd: |
        ./dewy server -p 8000 -l debug \
        --registry "ghr://linyows/dewy-testapp?pre-release=true" \
        --notifier "slack://random?title=ghr&url=https://github.com/linyows/dewy-testapp&thread=true" \
        -- $PWD/current/dewy-testapp
    test: status == -1
    outputs:
      pid: res.pid
      log: res.log
    echo: |
      PID: {{ res.pid }}
      Log: {{ res.log }}
  - name: Wait for initial deployment
    uses: shell
    retry:
      max_attempts: 60
      interval: 5s
    with:
      cmd: |
        if [ -f "{{ outputs.srv_ghr.log }}" ]; then
          grep -q 'Create symlink' "{{ outputs.srv_ghr.log }}" && exit 0
        fi
        exit 1
    test: status == 0

