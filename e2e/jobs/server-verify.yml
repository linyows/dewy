name: Server Verify

steps:
- name: Wait for new version to start
  uses: shell
  retry:
    max_attempts: 60
    interval: 5s
  with:
    cmd: |
      if [ -f "{{ vars.log }}" ]; then
        grep "starting version" "{{ vars.log }}" | \
          grep -q "{{ replace(vars.new_version, 'v', '') }}" && exit 0
      fi
      exit 1
  test: status == 0

- name: Wait for stabilization
  wait: 30s
  uses: shell
  with:
    cmd: "echo 'Waiting for system stabilization after new version detection'"
  test: status == 0

- name: Verify server telemetry metrics
  id: metrics
  # Only the telemetry-enabled server variant passes metrics_port; others skip.
  skipif: "!('metrics_port' in vars)"
  uses: http
  with:
    get: "http://localhost:{{ vars.metrics_port }}/metrics"
  # A 200 proves /metrics is served in server mode (a path that only exists when
  # telemetry is enabled). The command="server" deployment series and the
  # reason="deploy" restart confirm the server-mode deployment/restart recording
  # end-to-end; dewy_server_up confirms the up-state observer is wired. Crash and
  # signal-restart metrics are covered by unit tests, not here.
  test: |
    res.code == 200 &&
    res.body contains "dewy_deployments_total{" &&
    res.body contains "command=\"server\"" &&
    res.body contains "dewy_server_up" &&
    res.body contains "dewy_server_restarts_total{" &&
    res.body contains "reason=\"deploy\""
  echo: |
    {{ join(filter(split(res.body, "\n"), hasPrefix(#, "dewy_")), "\n") }}

- name: Stop dewy
  uses: shell
  with: # Use Process Group ID
    cmd: "kill -TERM -{{ vars.pid }}"
  test: status == 0

- name: Verify no error
  id: noerr
  uses: shell
  with:
    # Match only level=ERROR. The previous "grep -i error" also matched the
    # `error="..."` slog field used by INFO/WARN log lines, which produced
    # false positives for benign warnings (e.g. registry-cache fail-open).
    cmd: "grep 'level=ERROR' {{ vars.log }}"
  test: status == 1
  outputs:
    ok: status == 1

- name: Verify two symlinks creates
  id: twosyml
  uses: shell
  with:
    cmd: |
      grep -c 'Create symlink' {{ vars.log }} | tr -d '\n'
  test: res.stdout == "2"
  outputs:
    ok: res.stdout == "2"

- name: Verify starting two version
  id: twover
  uses: shell
  with:
    cmd: |
      grep -c 'starting version' {{ vars.log }} | tr -d '\n'
  test: res.stdout == "2" || res.stdout == "3"
  outputs:
    ok: res.stdout == "2" || res.stdout == "3"

- name: Verify starting new version
  id: newver
  uses: shell
  with:
    cmd: |
      grep 'starting version' {{ vars.log }} | \
        grep {{ replace(vars.new_version, 'v', '') }}
  test: status == 0
  outputs:
    ok: status == 0

- name: Show log
  skipif: outputs.noerr.ok && outputs.twosyml.ok && outputs.twover.ok && outputs.newver.ok
  uses: shell
  with:
    cmd: "cat {{ vars.log }}"
  echo: "{{ res.stdout }}"
